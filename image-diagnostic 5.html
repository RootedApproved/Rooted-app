<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ROOTED — Image Diagnostic</title>
<style>
  body{font-family:-apple-system,system-ui,sans-serif;background:#F5F0E6;color:#1A1A1A;padding:20px;max-width:800px;margin:0 auto;}
  h1{font-size:20px;margin-bottom:4px;}
  .sub{color:#666;font-size:13px;margin-bottom:20px;}
  #summary{background:#2D5016;color:white;padding:14px 16px;border-radius:6px;margin-bottom:16px;font-size:14px;display:flex;gap:24px;}
  #summary b{font-size:20px;display:block;}
  .row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid #DDD8CE;background:white;}
  .row:first-child{border-radius:6px 6px 0 0;}
  .row:last-child{border-radius:0 0 6px 6px;border-bottom:none;}
  .status{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
  .ok{background:#2D5016;}
  .fail{background:#B53A2F;}
  .pending{background:#DDD8CE;animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .name{flex:1;min-width:0;}
  .name b{display:block;font-size:13px;}
  .name span{font-size:11px;color:#888;word-break:break-all;}
  .reason{font-size:11px;color:#B53A2F;max-width:220px;text-align:right;}
  #list{border:1px solid #DDD8CE;border-radius:6px;overflow:hidden;}
  button{background:#2D5016;color:white;border:none;padding:10px 18px;border-radius:4px;font-size:14px;cursor:pointer;margin-bottom:16px;}
  button:disabled{opacity:.5;}
</style>
</head>
<body>
<h1>ROOTED — Product Image Diagnostic</h1>
<div class="sub">Tests every product URL against your Cloudflare worker and shows which ones fail to return an image.</div>
<button id="runBtn" onclick="runAll()">Run Diagnostic</button>
<div id="summary" style="display:none">
  <div><b id="sOk">0</b>Working</div>
  <div><b id="sFail">0</b>Failed</div>
  <div><b id="sTotal">0</b>Total</div>
</div>
<div id="list"></div>

<script>
const CF_WORKER = 'https://rooted.team-ce0.workers.dev';

// Product id, brand/name, and product page URL — pulled from rooted app.html
const PRODUCTS = [
["cottonique-drawstring-boxer","Cottonique — Drawstring Loose Boxer","https://cottonique.com/products/latex-free-mens-drawstring-loose-boxer-shorts-2-pack"],
["cottonique-boxer-brief","Cottonique — Boxer Brief","https://cottonique.com/products/latex-free-mens-rib-drawstring-boxer-brief-w-fly"],
["rawganique-joey","Rawganique — JOEY Hemp Boxer","https://rawganique.com/products/all-american-classic-hemp-boxers-joey"],
["rawganique-bach","Rawganique — BACH Cotton Boxer","https://rawganique.com/products/elastic-free-organic-prima-cotton-knit-boxers-bach"],
["cottonique-crew-socks","Cottonique — Crew Socks","https://cottonique.com/products/elite-elastic-free-100-cotton-socks-black-2-pack"],
["cottonique-quarter-socks","Cottonique — Quarter Socks","https://cottonique.com/products/elastic-free-100-organic-cotton-quarter-socks-2-pairs-pack"],
["rawganique-canaltown","Rawganique — CANALTOWN Socks","https://rawganique.com/products/organic-cotton-jacquard-socks-no-elastic"],
["rawganique-creekmill","Rawganique — CREEKMILL Socks","https://rawganique.com/products/elastic-free-ribbed-organic-cotton-socks-3-ply-biodegradable"],
["cottonique-henley","Cottonique — Henley","https://cottonique.com/products/mens-slub-henley-neck-short-sleeve"],
["harvest-mill-tee","Harvest & Mill — Undyed Tee","https://harvestandmill.com/products/mens-crew"],
["cottonique-long-sleeve","Cottonique — Long Sleeve Tee","https://cottonique.com/products/mens-henley-long-sleeve-shirt-smoke-blue"],
["cottonique-thermal","Cottonique — Thermal Long Sleeve","https://cottonique.com/products/hypoallergenic-mens-thermal-long-sleeve"],
["npl-montreal","Not Perfect Linen — MONTREAL Shirt","https://notperfectlinen.com/products/mens-linen-shirts-long-sleeve-montreal"],
["npl-darwin","Not Perfect Linen — DARWIN Shorts","https://notperfectlinen.com/products/mens-linen-shorts-darwin"],
["npl-byron","Not Perfect Linen — BYRON Shorts","https://notperfectlinen.com/products/linen-shorts-men-darwin"],
["npl-ontario","Not Perfect Linen — ONTARIO Pants","https://notperfectlinen.com/products/mens-linen-drawstring-pants-ontario"],
["nads","NADS — Ball-Natural Boxer","https://nadsunder.com/products/natural-mens-boxers"],
["rawganique-moby","Rawganique — MOBY Boxer","https://rawganique.com/products/organic-prima-cotton-boxer-shorts-moby"],
["ryker-titan","Ryker — Titan Merino Boxer Brief","https://rykerclothingco.com/products/the-titan-100-merino-wool-boxer-brief"],
["ryker-atlas","Ryker — Atlas Cotton Boxer Brief","https://rykerclothingco.com/products/the-atlas-100-organic-cotton-boxer-brief"],
["maro-boxer-brief","MARO — Boxer Briefs","https://wearmaro.com/products/plastic-free-boxers"],
["maro-relaxed-boxer","MARO — Relaxed Boxer","https://wearmaro.com/products/100-plastic-free-organic-cotton-button-boxers"],
["npl-quebec","Not Perfect Linen — QUEBEC Shirt","https://notperfectlinen.com/products/men-s-short-sleeve-linen-shirt-quebec-5"],
["jungmaven-mana10","Jungmaven — Mana 10 Hemp Tee","https://jungmaven.com/products/hemp-shirt-100-tee-mana-10"],
["jungmaven-baja","Jungmaven — Baja Tee","https://jungmaven.com/products/hemp-shirt-short-sleve-baja-5oz"],
["alexcrane-suntee","Alex Crane — Sun Tee","https://alexcrane.co/products/sun-tee-steel"],
["alexcrane-playa","Alex Crane — Playa Shirt","https://alexcrane.co/products/playa-shirt-bone"],
["ryker-apex","Ryker — Apex Short","https://rykerclothingco.com/products/the-apex-short-master"],
["ryker-ares","Ryker — Ares Short","https://rykerclothingco.com/products/the-ascend-100-organic-cotton-shorts-navy-5-5-copy"],
["ryker-apollo","Ryker — Apollo Merino Short","https://rykerclothingco.com/collections/mens-shorts-vf"],
["alexcrane-bo-shorts","Alex Crane — Bo Shorts","https://alexcrane.co/products/bo-shorts-bone"],
["alexcrane-bo-pants","Alex Crane — Bo Pants","https://alexcrane.co/products/bo-pants-bone"],
];

function timeoutPromise(ms) {
  return new Promise((_, reject) => setTimeout(() => reject(new Error('Timed out')), ms));
}

async function testProduct(id, name, url) {
  const row = document.getElementById('row-' + id);
  try {
    const res = await Promise.race([
      fetch(CF_WORKER + '?url=' + encodeURIComponent(url)),
      timeoutPromise(15000)
    ]);
    const data = await res.json();
    if (data.image) {
      row.querySelector('.status').className = 'status ok';
      row.querySelector('.reason').textContent = 'OK';
      return true;
    } else {
      row.querySelector('.status').className = 'status fail';
      row.querySelector('.reason').textContent = data.error || 'No og:image found on page';
      return false;
    }
  } catch (e) {
    row.querySelector('.status').className = 'status fail';
    row.querySelector('.reason').textContent = e.message || 'Request failed/timed out';
    return false;
  }
}

async function runAll() {
  document.getElementById('runBtn').disabled = true;
  document.getElementById('summary').style.display = 'flex';
  const list = document.getElementById('list');
  list.innerHTML = PRODUCTS.map(([id, name, url]) => `
    <div class="row" id="row-${id}">
      <div class="status pending"></div>
      <div class="name"><b>${name}</b><span>${url}</span></div>
      <div class="reason">testing…</div>
    </div>`).join('');

  let ok = 0, fail = 0;
  // Run with limited concurrency (5 at a time) to avoid overwhelming the worker
  const queue = [...PRODUCTS];
  async function worker() {
    while (queue.length) {
      const [id, name, url] = queue.shift();
      const success = await testProduct(id, name, url);
      if (success) ok++; else fail++;
      document.getElementById('sOk').textContent = ok;
      document.getElementById('sFail').textContent = fail;
      document.getElementById('sTotal').textContent = ok + fail;
    }
  }
  await Promise.all([worker(), worker(), worker(), worker(), worker()]);
  document.getElementById('runBtn').disabled = false;
  document.getElementById('runBtn').textContent = 'Run Again';
}
</script>
</body>
</html>
